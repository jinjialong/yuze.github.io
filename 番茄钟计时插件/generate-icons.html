<!DOCTYPE html>
<html>
<head>
  <title>生成图标</title>
</head>
<body>
  <canvas id="canvas16" width="16" height="16"></canvas>
  <canvas id="canvas48" width="48" height="48"></canvas>
  <canvas id="canvas128" width="128" height="128"></canvas>
  <script>
    function drawTomato(ctx, size) {
      const centerX = size / 2;
      const centerY = size / 2;
      const radius = size * 0.35;

      // 番茄主体 - 红色圆形
      ctx.beginPath();
      ctx.arc(centerX, centerY + size * 0.05, radius, 0, 2 * Math.PI);
      ctx.fillStyle = '#ff6347';
      ctx.fill();

      // 番茄高光
      ctx.beginPath();
      ctx.arc(centerX - radius * 0.3, centerY + size * 0.05 - radius * 0.3, radius * 0.25, 0, 2 * Math.PI);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
      ctx.fill();

      // 叶子/蒂
      ctx.beginPath();
      ctx.moveTo(centerX, centerY - radius + size * 0.05);
      ctx.lineTo(centerX - size * 0.12, centerY - radius - size * 0.15 + size * 0.05);
      ctx.lineTo(centerX - size * 0.05, centerY - radius + size * 0.05);
      ctx.lineTo(centerX, centerY - radius - size * 0.2 + size * 0.05);
      ctx.lineTo(centerX + size * 0.05, centerY - radius + size * 0.05);
      ctx.lineTo(centerX + size * 0.12, centerY - radius - size * 0.15 + size * 0.05);
      ctx.closePath();
      ctx.fillStyle = '#228b22';
      ctx.fill();

      // 叶子茎
      ctx.beginPath();
      ctx.moveTo(centerX, centerY - radius + size * 0.05);
      ctx.lineTo(centerX, centerY - radius - size * 0.25 + size * 0.05);
      ctx.strokeStyle = '#228b22';
      ctx.lineWidth = Math.max(1, size * 0.04);
      ctx.stroke();
    }

    // 生成16x16图标
    const canvas16 = document.getElementById('canvas16');
    const ctx16 = canvas16.getContext('2d');
    drawTomato(ctx16, 16);

    // 生成48x48图标
    const canvas48 = document.getElementById('canvas48');
    const ctx48 = canvas48.getContext('2d');
    drawTomato(ctx48, 48);

    // 生成128x128图标
    const canvas128 = document.getElementById('canvas128');
    const ctx128 = canvas128.getContext('2d');
    drawTomato(ctx128, 128);

    // 输出Data URL（可以在浏览器控制台查看）
    console.log('icon16:', canvas16.toDataURL());
    console.log('icon48:', canvas48.toDataURL());
    console.log('icon128:', canvas128.toDataURL());
  </script>
</body>
</html>
