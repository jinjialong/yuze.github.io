<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>番茄钟计时器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    h1 {
      font-size: 20px;
      text-align: center;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .quick-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .quick-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .quick-btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }

    .quick-btn.active {
      background: rgba(255, 255, 255, 0.4);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .input-section {
      margin-bottom: 20px;
    }

    .input-label {
      font-size: 12px;
      opacity: 0.9;
      margin-bottom: 8px;
      display: block;
    }

    .time-input {
      width: 100%;
      padding: 12px 15px;
      border: none;
      border-radius: 10px;
      font-size: 32px;
      text-align: center;
      font-weight: 600;
      color: #333;
      background: white;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .time-input:focus {
      outline: none;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    .time-input:disabled {
      background: #f0f0f0;
      color: #666;
    }

    .unit {
      text-align: center;
      font-size: 12px;
      margin-top: 5px;
      opacity: 0.8;
    }

    .main-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-start {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(17, 153, 142, 0.4);
    }

    .btn-start:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(17, 153, 142, 0.5);
    }

    .btn-stop {
      background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(255, 65, 108, 0.4);
    }

    .btn-stop:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 65, 108, 0.5);
    }

    .status {
      text-align: center;
      margin-top: 15px;
      font-size: 13px;
      opacity: 0.9;
      min-height: 20px;
    }

    .status.running {
      color: #a8ff78;
    }

    .hidden {
      display: none;
    }

    .remaining-time {
      font-size: 14px;
      text-align: center;
      margin-top: 10px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      backdrop-filter: blur(10px);
    }

    .remaining-time.hidden {
      display: none;
    }

    .remaining-label {
      font-size: 11px;
      opacity: 0.8;
      margin-bottom: 4px;
    }

    .remaining-value {
      font-size: 24px;
      font-weight: 600;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>
  <h1>番茄钟计时器</h1>

  <div class="quick-buttons">
    <button class="quick-btn" data-minutes="25">25分钟</button>
    <button class="quick-btn" data-minutes="40">40分钟</button>
  </div>

  <div class="input-section">
    <label class="input-label">自定义时间</label>
    <input type="number" class="time-input" id="timeInput" placeholder="25" min="1" max="180">
    <div class="unit">分钟</div>
  </div>

  <button class="main-btn btn-start" id="actionBtn">开始计时</button>

  <div class="remaining-time hidden" id="remainingSection">
    <div class="remaining-label">剩余时间</div>
    <div class="remaining-value" id="remainingValue">00:00</div>
  </div>

  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
