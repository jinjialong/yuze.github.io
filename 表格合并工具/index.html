<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel表格合并工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 60px 40px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            background: #f8f9ff;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #666;
            font-size: 0.9rem;
        }

        #fileInput {
            display: none;
        }

        .file-info {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #f0f2ff;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .file-info.show {
            display: block;
        }

        .file-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .file-size {
            color: #666;
            font-size: 0.9rem;
        }

        .sheet-list {
            margin-top: 20px;
        }

        .sheet-list h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .sheet-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: all 0.2s;
        }

        .sheet-item:hover {
            border-color: #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.15);
        }

        .sheet-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin-right: 12px;
            font-size: 14px;
        }

        .sheet-name {
            flex: 1;
            font-weight: 500;
            color: #333;
        }

        .sheet-rows {
            color: #666;
            font-size: 0.85rem;
        }

        .options {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 8px;
        }

        .option-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .option-item:last-child {
            margin-bottom: 0;
        }

        .option-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .option-item label {
            cursor: pointer;
            color: #333;
        }

        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: center;
        }

        .preview-area {
            margin-top: 20px;
            max-height: 400px;
            overflow: auto;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            display: none;
        }

        .preview-area.show {
            display: block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            background: #f8f9ff;
            font-weight: 600;
            color: #333;
            position: sticky;
            top: 0;
        }

        tr:hover {
            background: #f8f9ff;
        }

        .status {
            margin-top: 15px;
            padding: 12px 16px;
            border-radius: 8px;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .status.show {
            display: flex;
        }

        .status:empty {
            display: none !important;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f0f0f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Excel表格合并工具</h1>
            <p>上传Excel文件，将多个Sheet合并成一个Sheet并导出</p>
        </div>

        <div class="card">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">&#128193;</div>
                <div class="upload-text">点击或拖拽上传Excel文件</div>
                <div class="upload-hint">支持 .xlsx, .xls, .csv 格式</div>
                <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
            </div>

            <div class="file-info" id="fileInfo">
                <div class="file-name" id="fileName"></div>
                <div class="file-size" id="fileSize"></div>

                <div class="stats" id="stats"></div>

                <div class="sheet-list" id="sheetList"></div>

                <div class="options">
                    <h3 style="margin-bottom: 15px; color: #333;">合并选项</h3>
                    <div class="option-item">
                        <input type="checkbox" id="addSourceColumn" checked>
                        <label for="addSourceColumn">添加来源列（显示数据来自哪个Sheet）</label>
                    </div>
                    <div class="option-item">
                        <input type="checkbox" id="skipEmptySheets" checked>
                        <label for="skipEmptySheets">跳过空Sheet</label>
                    </div>
                    <div class="option-item">
                        <input type="checkbox" id="includeHeader" checked>
                        <label for="includeHeader">每个Sheet包含表头（不勾选则只有第一个Sheet有表头）</label>
                    </div>
                </div>

                <div class="actions">
                    <button class="btn btn-primary" id="mergeBtn" disabled>
                        <span>&#128280;</span> 合并Sheet
                    </button>
                    <button class="btn btn-secondary" id="resetBtn">
                        <span>&#128260;</span> 重新上传
                    </button>
                </div>

            </div>

            <div class="status" id="status"></div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>正在处理文件...</p>
            </div>
        </div>

        <div class="card" id="previewCard" style="display: none;">
            <h2 style="margin-bottom: 20px; color: #333;">预览合并结果</h2>
            <div class="preview-area" id="previewArea">
                <table id="previewTable"></table>
            </div>
            <div class="actions" style="margin-top: 20px;">
                <button class="btn btn-primary" id="exportBtn">
                    <span>&#128190;</span> 导出合并后的Excel
                </button>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let currentWorkbook = null;
        let mergedData = null;
        let fileName = '';

        // DOM元素
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileNameEl = document.getElementById('fileName');
        const fileSizeEl = document.getElementById('fileSize');
        const sheetList = document.getElementById('sheetList');
        const stats = document.getElementById('stats');
        const mergeBtn = document.getElementById('mergeBtn');
        const resetBtn = document.getElementById('resetBtn');
        const status = document.getElementById('status');
        const loading = document.getElementById('loading');
        const previewCard = document.getElementById('previewCard');
        const previewArea = document.getElementById('previewArea');
        const previewTable = document.getElementById('previewTable');
        const exportBtn = document.getElementById('exportBtn');

        // 事件监听
        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        mergeBtn.addEventListener('click', mergeSheets);
        resetBtn.addEventListener('click', reset);
        exportBtn.addEventListener('click', exportExcel);

        // 处理文件上传
        function handleFile(file) {
            // 检查文件类型 - 优先通过扩展名判断
            const validExtension = file.name.match(/\.(xlsx|xls|csv)$/i);

            if (!validExtension) {
                showStatus('请选择有效的Excel文件 (.xlsx, .xls, .csv)', 'error');
                return;
            }

            fileName = file.name;
            fileNameEl.textContent = file.name;
            fileSizeEl.textContent = formatFileSize(file.size);

            loading.classList.add('show');
            uploadArea.style.display = 'none';

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    console.log('文件读取成功，正在解析...');
                    const data = e.target.result;
                    console.log('数据类型:', typeof data, '数据长度:', data.byteLength || data.length);

                    // 检查 XLSX 库是否加载
                    if (typeof XLSX === 'undefined') {
                        throw new Error('Excel解析库未加载，请检查网络连接');
                    }

                    currentWorkbook = XLSX.read(data, { type: 'array' });
                    console.log('解析成功，Sheet数量:', currentWorkbook.SheetNames.length);
                    displaySheetInfo();
                    fileInfo.classList.add('show');
                    loading.classList.remove('show');
                    mergeBtn.disabled = false;
                    showStatus('文件上传成功！共 ' + currentWorkbook.SheetNames.length + ' 个Sheet', 'success');
                } catch (error) {
                    console.error('解析错误:', error);
                    loading.classList.remove('show');
                    uploadArea.style.display = 'block';
                    showStatus('文件解析失败: ' + error.message, 'error');
                }
            };
            reader.onerror = (e) => {
                console.error('文件读取错误:', e);
                loading.classList.remove('show');
                uploadArea.style.display = 'block';
                showStatus('文件读取失败', 'error');
            };
            reader.readAsArrayBuffer(file);
        }

        // 显示Sheet信息
        function displaySheetInfo() {
            const sheetNames = currentWorkbook.SheetNames;
            let totalRows = 0;

            // 清空之前的内容
            sheetList.innerHTML = '<h3>工作表列表</h3>';
            stats.innerHTML = '';

            sheetNames.forEach((name, index) => {
                const sheet = currentWorkbook.Sheets[name];
                const range = XLSX.utils.decode_range(sheet['!ref'] || 'A1');
                const rowCount = range.e.r - range.s.r + 1;
                totalRows += rowCount;

                const sheetItem = document.createElement('div');
                sheetItem.className = 'sheet-item';
                sheetItem.innerHTML = `
                    <div class="sheet-icon">${index + 1}</div>
                    <div class="sheet-name">${name}</div>
                    <div class="sheet-rows">${rowCount} 行</div>
                `;
                sheetList.appendChild(sheetItem);
            });

            // 显示统计
            stats.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${sheetNames.length}</div>
                    <div class="stat-label">工作表数量</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${totalRows}</div>
                    <div class="stat-label">总行数</div>
                </div>
            `;
        }

        // 合并Sheet
        function mergeSheets() {
            if (!currentWorkbook) return;

            const addSourceColumn = document.getElementById('addSourceColumn').checked;
            const skipEmptySheets = document.getElementById('skipEmptySheets').checked;
            const includeHeader = document.getElementById('includeHeader').checked;

            loading.classList.add('show');

            setTimeout(() => {
                try {
                    const sheetNames = currentWorkbook.SheetNames;
                    let allData = [];
                    let headers = null;

                    sheetNames.forEach((sheetName) => {
                        const sheet = currentWorkbook.Sheets[sheetName];
                        const jsonData = XLSX.utils.sheet_to_json(sheet, { header: 1 });

                        if (jsonData.length === 0) {
                            if (skipEmptySheets) return;
                        }

                        if (jsonData.length > 0) {
                            if (!headers) {
                                headers = jsonData[0];
                                if (addSourceColumn && !headers.includes('来源Sheet')) {
                                    headers = ['来源Sheet', ...headers];
                                }
                                allData.push(headers);
                            }

                            const dataRows = jsonData.slice(1).filter(row =>
                                row.some(cell => cell !== undefined && cell !== null && cell !== '')
                            );

                            dataRows.forEach(row => {
                                if (addSourceColumn) {
                                    allData.push([sheetName, ...row]);
                                } else {
                                    allData.push(row);
                                }
                            });
                        }
                    });

                    if (allData.length <= 1) {
                        showStatus('没有可合并的数据', 'error');
                        loading.classList.remove('show');
                        return;
                    }

                    mergedData = allData;

                    // 显示预览
                    displayPreview(allData);

                    previewCard.style.display = 'block';
                    previewCard.scrollIntoView({ behavior: 'smooth' });

                    loading.classList.remove('show');
                    showStatus(`合并成功！共 ${allData.length - 1} 行数据`, 'success');

                } catch (error) {
                    loading.classList.remove('show');
                    showStatus('合并失败: ' + error.message, 'error');
                }
            }, 100);
        }

        // 显示预览
        function displayPreview(data) {
            if (!data || data.length === 0) return;

            const maxPreviewRows = 100;
            const previewData = data.slice(0, maxPreviewRows + 1);

            let html = '<thead><tr>';
            previewData[0].forEach(header => {
                html += `<th>${header !== undefined ? header : ''}</th>`;
            });
            html += '</tr></thead><tbody>';

            for (let i = 1; i < previewData.length; i++) {
                html += '<tr>';
                previewData[i].forEach(cell => {
                    html += `<td>${cell !== undefined ? cell : ''}</td>`;
                });
                html += '</tr>';
            }

            if (data.length > maxPreviewRows + 1) {
                html += `<tr><td colspan="${previewData[0].length}" style="text-align:center;color:#666;">
                    ... 还有 ${data.length - maxPreviewRows - 1} 行数据 ...
                </td></tr>`;
            }

            html += '</tbody>';
            previewTable.innerHTML = html;
            previewArea.classList.add('show');
        }

        // 导出Excel
        function exportExcel() {
            if (!mergedData) return;

            try {
                const newWorkbook = XLSX.utils.book_new();
                const newSheet = XLSX.utils.aoa_to_sheet(mergedData);

                // 设置列宽
                const colWidths = mergedData[0].map((_, colIndex) => {
                    let maxWidth = 10;
                    for (let rowIndex = 0; rowIndex < Math.min(mergedData.length, 100); rowIndex++) {
                        const cell = mergedData[rowIndex][colIndex];
                        if (cell !== undefined && cell !== null) {
                            const cellWidth = String(cell).length;
                            maxWidth = Math.max(maxWidth, Math.min(cellWidth, 50));
                        }
                    }
                    return { wch: maxWidth + 2 };
                });
                newSheet['!cols'] = colWidths;

                XLSX.utils.book_append_sheet(newWorkbook, newSheet, '合并结果');

                // 生成文件名
                const baseName = fileName.replace(/\.[^/.]+$/, '');
                const exportName = `${baseName}_合并_${new Date().toISOString().slice(0, 10)}.xlsx`;

                XLSX.writeFile(newWorkbook, exportName);

                showStatus('导出成功！', 'success');
            } catch (error) {
                showStatus('导出失败: ' + error.message, 'error');
            }
        }

        // 重置
        function reset() {
            currentWorkbook = null;
            mergedData = null;
            fileName = '';
            fileInput.value = '';

            fileInfo.classList.remove('show');
            uploadArea.style.display = 'block';
            status.classList.remove('show');
            previewCard.style.display = 'none';
            previewArea.classList.remove('show');
            mergeBtn.disabled = true;
            status.classList.remove('show');

            sheetList.innerHTML = '';
            stats.innerHTML = '';
            previewTable.innerHTML = '';
        }

        // 显示状态
        function showStatus(message, type) {
            status.textContent = message;
            status.className = `status ${type} show`;

            setTimeout(() => {
                status.classList.remove('show');
            }, 5000);
        }

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
    </script>
</body>
</html>
