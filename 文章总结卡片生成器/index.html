<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章总结卡片生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            color: rgba(255,255,255,0.9);
            font-size: 1.1rem;
        }

        .input-section {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .api-status {
            background: #fff3e0;
            border-left: 4px solid #ff9800;
            padding: 12px 16px;
            margin-bottom: 20px;
            border-radius: 4px;
            color: #e65100;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .config-section {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid #e9ecef;
        }

        .config-section summary {
            cursor: pointer;
            font-weight: 600;
            color: #495057;
            user-select: none;
        }

        .config-section[open] summary {
            margin-bottom: 16px;
        }

        .config-section .hint {
            color: #868e96;
            font-weight: normal;
            font-size: 0.85rem;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-group input::placeholder {
            color: #aaa;
        }

        .btn-generate {
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-generate:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .btn-generate .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .btn-generate.loading .spinner {
            display: block;
        }

        .btn-generate.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result-section {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: none;
        }

        .result-section.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .result-header h2 {
            color: #333;
            font-size: 1.3rem;
        }

        .btn-download {
            padding: 10px 20px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(17, 153, 142, 0.3);
        }

        .image-container {
            border-radius: 12px;
            overflow: hidden;
            background: #f5f5f5;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-container img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        .image-placeholder {
            color: #999;
            font-size: 1rem;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 16px 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            align-items: flex-start;
            gap: 10px;
            white-space: pre-line;
            line-height: 1.6;
        }

        .error-message.show {
            display: flex;
        }

        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 16px 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .success-message.show {
            display: flex;
        }

        .icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .input-section, .result-section {
                padding: 20px;
            }

            .result-header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>文章总结卡片生成器</h1>
            <p>输入文章链接，自动生成精美的总结卡片</p>
        </div>

        <div class="input-section">
            <div class="api-status" id="apiStatus">
                <strong>⚠️ 重要提示：</strong>如果提示 401 错误，请在下方 "API 配置" 中填入新的 Token。
            </div>

            <details class="config-section">
                <summary>⚙️ API 配置（点击展开）</summary>
                <div class="input-group">
                    <label for="apiToken">API Token <span class="hint">从 Coze 平台获取</span></label>
                    <input type="password" id="apiToken" placeholder="输入你的 Coze API Token">
                </div>
                <div class="input-group">
                    <label for="workflowId">Workflow ID</label>
                    <input type="text" id="workflowId" value="7627780230593364003" placeholder="工作流ID">
                </div>
            </details>

            <div class="input-group">
                <label for="articleUrl">文章链接</label>
                <input
                    type="url"
                    id="articleUrl"
                    placeholder="请输入文章链接，例如：https://www.weiyong.wang"
                    required
                >
            </div>
            <button class="btn-generate" id="generateBtn" onclick="generateCard()">
                <span class="spinner"></span>
                <span class="btn-text">生成卡片</span>
            </button>
            <div class="error-message" id="errorMessage">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                <span id="errorText"></span>
            </div>
        </div>

        <div class="result-section" id="resultSection">
            <div class="result-header">
                <h2>生成的卡片</h2>
                <button class="btn-download" id="downloadBtn" onclick="downloadImage()">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    下载图片
                </button>
            </div>
            <div class="image-container" id="imageContainer">
                <span class="image-placeholder">图片加载中...</span>
            </div>
            <div class="success-message" id="successMessage">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                <span>卡片生成成功！</span>
            </div>
        </div>
    </div>

    <script>
        // API 配置
        const API_URL = 'https://api.coze.cn/v1/workflow/run';
        const API_TOKEN = 'cztei_lLp8a8FjDLTzCoxxuGNbAc2Wsb6rMHRMr3UOi1A4EbhX8uwCQ2oUJ3WNbfpP9BJB1';
        const WORKFLOW_ID = '7627780230593364003';

        let currentImageUrl = '';

        // 生成卡片
        async function generateCard() {
            const input = document.getElementById('articleUrl').value.trim();
            const tokenInput = document.getElementById('apiToken').value.trim();
            const workflowInput = document.getElementById('workflowId').value.trim();

            const generateBtn = document.getElementById('generateBtn');
            const errorMessage = document.getElementById('errorMessage');
            const resultSection = document.getElementById('resultSection');

            // 使用输入的 Token 或默认 Token
            const token = tokenInput || API_TOKEN;
            const workflowId = workflowInput || WORKFLOW_ID;

            // 验证输入
            if (!input) {
                showError('请输入文章链接');
                return;
            }

            if (!token) {
                showError('请输入 API Token');
                return;
            }

            // 隐藏之前的错误和结果
            hideError();
            resultSection.classList.remove('show');

            // 设置加载状态
            generateBtn.classList.add('loading');
            generateBtn.disabled = true;

            console.log('使用 Token:', token.substring(0, 20) + '...');
            console.log('使用 Workflow ID:', workflowId);

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        workflow_id: workflowId,
                        parameters: {
                            input: input
                        }
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                console.log('API Response:', data);

                // 检查响应码
                if (data.code !== 0) {
                    throw new Error(data.msg || 'API 调用失败');
                }

                // 解析 data 字段（JSON 字符串）
                let parsedData;
                try {
                    parsedData = JSON.parse(data.data);
                } catch (e) {
                    throw new Error('解析响应数据失败');
                }

                // 获取图片 URL
                const imageUrl = parsedData.output;
                if (!imageUrl) {
                    throw new Error('未找到图片 URL');
                }

                currentImageUrl = imageUrl;

                // 显示结果
                displayImage(imageUrl);
                resultSection.classList.add('show');
                showSuccess();

            } catch (error) {
                console.error('Error:', error);
                let errorMsg = error.message;

                // 详细的错误提示
                if (error.message.includes('401')) {
                    errorMsg = '授权失败 (401)\n\n可能原因：\n1. Token 已过期 - 请在 Coze 平台重新生成\n2. Token 格式错误 - 确保完整复制\n3. 工作流未授权 - 检查 Token 是否有权限访问此工作流\n4. 域名白名单 - Coze 可能需要添加你的网站域名\n\n当前使用的 Token 前20位: ' + (token ? token.substring(0, 20) + '...' : '空');
                } else if (error.message.includes('CORS') || error.message.includes('Failed to fetch')) {
                    errorMsg = '跨域请求被阻止。Coze API 可能不允许前端直接调用，建议使用后端代理。';
                } else if (error.message.includes('404')) {
                    errorMsg = '工作流未找到 (404)：请检查 workflow_id 是否正确';
                }

                showError('生成失败：' + errorMsg);
            } finally {
                // 移除加载状态
                generateBtn.classList.remove('loading');
                generateBtn.disabled = false;
            }
        }

        // 显示图片
        function displayImage(url) {
            const container = document.getElementById('imageContainer');
            container.innerHTML = `<img src="${url}" alt="生成的卡片" onload="this.style.opacity=1" style="opacity:0;transition:opacity 0.3s">`;
        }

        // 下载图片
        async function downloadImage() {
            if (!currentImageUrl) {
                showError('没有可下载的图片');
                return;
            }

            try {
                const response = await fetch(currentImageUrl);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `文章总结卡片_${new Date().getTime()}.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
            } catch (error) {
                // 如果下载失败，直接在新标签页打开
                window.open(currentImageUrl, '_blank');
            }
        }

        // 显示错误信息
        function showError(message) {
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorMessage.classList.add('show');
        }

        // 隐藏错误信息
        function hideError() {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.classList.remove('show');
        }

        // 显示成功信息
        function showSuccess() {
            const successMessage = document.getElementById('successMessage');
            successMessage.classList.add('show');
            setTimeout(() => {
                successMessage.classList.remove('show');
            }, 3000);
        }

        // 监听回车键
        document.getElementById('articleUrl').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generateCard();
            }
        });
    </script>
</body>
</html>
